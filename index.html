<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FarmChain X | Direct Farmer Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap");

      :root {
        --farm-green: #10b981;
        --farm-emerald: #059669;
        --bg-dark: #020617;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: var(--bg-dark);
        color: #f8fafc;
        margin: 0;
        -webkit-font-smoothing: antialiased;
      }

      .glass-card {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .glass-card:hover {
        border-color: rgba(16, 185, 129, 0.4);
        transform: translateY(-2px);
      }

      .nav-link {
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        width: 100%;
        border-radius: 12px;
        color: #94a3b8;
      }

      .nav-link:hover {
        background: rgba(255, 255, 255, 0.05);
        color: white;
      }

      .nav-link.active {
        background: rgba(16, 185, 129, 0.15);
        color: #34d399;
        font-weight: 600;
      }

      .category-pill {
        transition: all 0.3s ease;
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .category-pill.active {
        background: var(--farm-green);
        color: white;
        border-color: var(--farm-green);
        box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
      }

      .product-img {
        aspect-ratio: 1/1;
        object-fit: cover;
        border-radius: 20px;
      }

      .view-section {
        display: none;
      }

      .view-section.active {
        display: block;
        animation: fadeIn 0.4s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .verification-tag {
        background: rgba(16, 185, 129, 0.1);
        color: #34d399;
        padding: 4px 12px;
        border-radius: 99px;
        font-size: 0.75rem;
        font-weight: 700;
        border: 1px solid rgba(16, 185, 129, 0.2);
      }

      /* Hide scrollbar for category list */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body class="flex min-h-screen">
    <!-- Sidebar -->
    <aside
      class="w-72 fixed h-screen glass-card border-r border-slate-800/50 p-6 flex flex-col z-50"
    >
      <div
        class="flex items-center gap-3 mb-10 px-2 cursor-pointer"
        onclick="showView('home')"
      >
        <div
          class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-900/20"
        >
          <i data-lucide="sprout" class="text-white w-6 h-6"></i>
        </div>
        <span class="text-2xl font-black tracking-tight text-white"
          >FarmChain <span class="text-emerald-500">X</span></span
        >
      </div>

      <nav class="space-y-2 flex-1">
        <button
          onclick="showView('home')"
          class="nav-link active"
          id="btn-home"
        >
          <i data-lucide="home" class="w-5 h-5"></i> Home
        </button>
        <button
          onclick="showView('categories')"
          class="nav-link"
          id="btn-categories"
        >
          <i data-lucide="layout-grid" class="w-5 h-5"></i> Categories
        </button>
        <button onclick="showView('orders')" class="nav-link" id="btn-orders">
          <i data-lucide="shopping-bag" class="w-5 h-5"></i> Your Orders
        </button>
        <button
          onclick="showView('top-farms')"
          class="nav-link"
          id="btn-top-farms"
        >
          <i data-lucide="award" class="w-5 h-5"></i> Top Farms
        </button>
        <div class="pt-6 mt-6 border-t border-slate-800/50 space-y-2">
          <button class="nav-link">
            <i data-lucide="heart" class="w-5 h-5"></i> Favorites
          </button>
          <button class="nav-link">
            <i data-lucide="settings" class="w-5 h-5"></i> Settings
          </button>
        </div>
      </nav>

      <div
        class="p-4 bg-slate-900/50 rounded-2xl border border-white/5 mt-auto"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 rounded-full bg-emerald-500 flex items-center justify-center font-bold"
          >
            JD
          </div>
          <div class="overflow-hidden">
            <p class="text-sm font-bold text-white">Athira K Jayan</p>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest">
              Premium Buyer
            </p>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-72 p-8">
      <!-- Top Search Bar (Fixed for all views) -->
      <div class="max-w-6xl mx-auto mb-8">
        <div class="relative group">
          <i
            data-lucide="search"
            class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 w-5 h-5 group-focus-within:text-emerald-500 transition-colors"
          ></i>
          <input
            type="text"
            id="searchInput"
            placeholder="Search fresh tomatoes, organic eggs, or local farms..."
            class="w-full bg-slate-900/80 border border-slate-800 rounded-2xl py-4 pl-14 pr-6 text-white focus:outline-none focus:ring-2 focus:ring-emerald-500/40 transition-all placeholder:text-slate-600"
          />
        </div>
      </div>

      <div id="content-area" class="max-w-6xl mx-auto">
        <!-- HOME VIEW -->
        <section id="view-home" class="view-section active">
          <div class="flex items-center justify-between mb-8">
            <h2 class="text-3xl font-black text-white">Fresh From The Field</h2>
            <div class="flex gap-2">
              <button class="p-2 hover:bg-white/5 rounded-lg">
                <i data-lucide="sliders-horizontal" class="w-5 h-5"></i>
              </button>
            </div>
          </div>

          <div
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"
            id="productGrid"
          >
            <!-- Products injected via JS -->
          </div>
        </section>

        <!-- CATEGORIES VIEW -->
        <section id="view-categories" class="view-section">
          <h2 class="text-3xl font-black text-white mb-8">Categories</h2>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
            <div
              onclick="filterCategory('Vegetables')"
              class="glass-card p-6 rounded-3xl text-center cursor-pointer hover:bg-emerald-500/10 border-emerald-500/20"
            >
              <i
                data-lucide="carrot"
                class="w-10 h-10 text-emerald-500 mx-auto mb-4"
              ></i>
              <span class="font-bold">Vegetables</span>
            </div>
            <div
              onclick="filterCategory('Fruits')"
              class="glass-card p-6 rounded-3xl text-center cursor-pointer hover:bg-orange-500/10 border-orange-500/20"
            >
              <i
                data-lucide="apple"
                class="w-10 h-10 text-orange-500 mx-auto mb-4"
              ></i>
              <span class="font-bold">Fruits</span>
            </div>
            <div
              onclick="filterCategory('Animal')"
              class="glass-card p-6 rounded-3xl text-center cursor-pointer hover:bg-yellow-500/10 border-yellow-500/20"
            >
              <i
                data-lucide="egg"
                class="w-10 h-10 text-yellow-500 mx-auto mb-4"
              ></i>
              <span class="font-bold">Dairy & Eggs</span>
            </div>
            <div
              onclick="filterCategory('Meat')"
              class="glass-card p-6 rounded-3xl text-center cursor-pointer hover:bg-red-500/10 border-red-500/20"
            >
              <i
                data-lucide="drumstick"
                class="w-10 h-10 text-red-500 mx-auto mb-4"
              ></i>
              <span class="font-bold">Fresh Meat</span>
            </div>
          </div>
          <div
            id="categoryResults"
            class="grid grid-cols-1 md:grid-cols-4 gap-6"
          ></div>
        </section>

        <!-- PRODUCT DETAIL VIEW -->
        <section id="view-product-detail" class="view-section">
          <button
            onclick="showView('home')"
            class="mb-6 flex items-center gap-2 text-slate-400 hover:text-white transition-colors"
          >
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to marketplace
          </button>
          <div
            class="grid grid-cols-1 lg:grid-cols-12 gap-10"
            id="productDetailContent"
          >
            <!-- Detail injected via JS -->
          </div>
        </section>

        <!-- FARM DETAIL VIEW -->
        <section id="view-farm-detail" class="view-section">
          <button
            onclick="showView('home')"
            class="mb-6 flex items-center gap-2 text-slate-400 hover:text-white transition-colors"
          >
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to marketplace
          </button>
          <div id="farmDetailContent">
            <!-- Farm injected via JS -->
          </div>
        </section>

        <!-- TOP FARMS VIEW -->
        <section id="view-top-farms" class="view-section">
          <h2 class="text-3xl font-black text-white mb-8">
            Top Verified Farms
          </h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="topFarmsList">
            <!-- Top farms injected via JS -->
          </div>
        </section>
      </div>
    </main>

    <script>
      // Mock Data
      const products = [
        {
          id: 1,
          name: "Heirloom Tomatoes",
          category: "Vegetables",
          price: 4.5,
          rating: 4.9,
          image:
            "https://images.unsplash.com/photo-1592924357228-91a4daadcfea?auto=format&fit=crop&q=80&w=400",
          farmId: 101,
          unit: "kg",
        },
        {
          id: 2,
          name: "Organic Russet Potatoes",
          category: "Vegetables",
          price: 2.3,
          rating: 4.7,
          image:
            "https://imgs.search.brave.com/ji35ltWn6P-ikFM2GtAsetVXl5RnzCUllKeVXKWMcUM/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly90aHVt/YnMuZHJlYW1zdGlt/ZS5jb20vYi9yYXct/b3JnYW5pYy1ydXNz/ZXQtcG90YXRvZXMt/YnVuY2gtMjQ0MzUz/MTY5LmpwZw",
          farmId: 102,
          unit: "kg",
        },
        {
          id: 3,
          name: "Free Range Brown Eggs",
          category: "Animal",
          price: 6.0,
          rating: 5.0,
          image:
            "https://images.unsplash.com/photo-1506976785307-8732e854ad03?auto=format&fit=crop&q=80&w=600",
          farmId: 103,
          unit: "doz",
        },
        {
          id: 4,
          name: "Grass-Fed Ribeye",
          category: "Meat",
          price: 24.99,
          rating: 4.8,
          image:
            "https://images.unsplash.com/photo-1603048297172-c92544798d5a?auto=format&fit=crop&q=80&w=400",
          farmId: 103,
          unit: "lb",
        },
        {
          id: 5,
          name: "Bell Peppers Mix",
          category: "Vegetables",
          price: 3.2,
          rating: 4.6,
          image:
            "https://images.unsplash.com/photo-1566567173737-251f930058ec?auto=format&fit=crop&q=80&w=400",
          farmId: 101,
          unit: "lb",
        },
        {
          id: 6,
          name: "Honey Crisp Apples",
          category: "Fruits",
          price: 5.4,
          rating: 4.9,
          image:
            "https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?auto=format&fit=crop&q=80&w=400",
          farmId: 102,
          unit: "bag",
        },
      ];

      const farms = {
        101: {
          name: "Gloria's Sun Valley Farm",
          image:
            "https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&q=80&w=600",
          description:
            "Gloria has been running this valley farm for 20 years, focusing on heirloom seeds and natural pest control. We believe in transparency and soil health.",
          tags: ["Verified Organic", "No Pesticides", "Safe Fertilizers"],
          rating: 4.9,
          location: "Napa Valley, CA",
          images: [
            "https://images.unsplash.com/photo-1464226184884-fa280b87c399?auto=format&fit=crop&q=80&w=200",
            "https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?auto=format&fit=crop&q=80&w=200",
          ],
        },
        102: {
          name: "Highland Root Farm",
          image:
            "https://images.unsplash.com/photo-1495107336281-19951664d930?auto=format&fit=crop&q=80&w=600",
          description:
            "Specializing in root vegetables and mountain fruits. Our elevation gives our produce a unique sweetness.",
          tags: ["Mountain Grown", "Safe Fertilizers", "Local Pick"],
          rating: 4.7,
          location: "Asheville, NC",
          images: [
            "https://images.unsplash.com/photo-1595855759920-86582396756a?auto=format&fit=crop&q=80&w=200",
          ],
        },
        103: {
          name: "Ethical Pastures",
          image:
            "https://images.unsplash.com/photo-1516467508483-a7212febe31a?auto=format&fit=crop&q=80&w=600",
          description:
            "Where animals come first. Our livestock roam freely on rotated pastures. We provide the highest quality meat and eggs with zero hormones.",
          tags: [
            "Cruelty Free",
            "Vaccinated Animals",
            "Hormone Free",
            "Pasture Raised",
          ],
          rating: 5.0,
          location: "Lancaster, PA",
          images: [
            "https://images.unsplash.com/photo-1544473489-07469a93077e?auto=format&fit=crop&q=80&w=200",
            "https://images.unsplash.com/photo-1544473244-f6895a69ad41?auto=format&fit=crop&q=80&w=200",
          ],
        },
      };

      // Navigation Controller
      function showView(viewName) {
        document
          .querySelectorAll(".view-section")
          .forEach((v) => v.classList.remove("active"));
        document.getElementById(`view-${viewName}`).classList.add("active");

        document
          .querySelectorAll(".nav-link")
          .forEach((n) => n.classList.remove("active"));
        const btn = document.getElementById(`btn-${viewName}`);
        if (btn) btn.classList.add("active");

        if (viewName === "home") renderProducts(products, "productGrid");
        if (viewName === "top-farms") renderTopFarms();

        window.scrollTo(0, 0);
        lucide.createIcons();
      }

      // Render Marketplace
      function renderProducts(items, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = items
          .map(
            (p) => `
                <div class="glass-card p-4 rounded-3xl cursor-pointer group" onclick="viewProduct(${p.id})">
                    <div class="relative overflow-hidden rounded-2xl mb-4">
                        <img src="${p.image}" alt="${p.name}" class="product-img group-hover:scale-105 transition-transform duration-500">
                        <div class="absolute top-3 right-3 bg-black/60 backdrop-blur-md px-3 py-1 rounded-full text-xs font-bold text-white">
                            ★ ${p.rating}
                        </div>
                    </div>
                    <div class="flex justify-between items-start mb-1">
                        <h3 class="font-bold text-white truncate pr-2">${p.name}</h3>
                        <span class="text-emerald-400 font-extrabold">$${p.price.toFixed(2)}</span>
                    </div>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">${p.category} • ${p.unit}</p>
                </div>
            `,
          )
          .join("");
      }

      // Search Logic
      document.getElementById("searchInput").addEventListener("input", (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = products.filter(
          (p) =>
            p.name.toLowerCase().includes(term) ||
            p.category.toLowerCase().includes(term),
        );
        renderProducts(filtered, "productGrid");
        showView("home");
      });

      // Detail Views
      function viewProduct(id) {
        const product = products.find((p) => p.id === id);
        const farm = farms[product.farmId];

        const detailView = document.getElementById("productDetailContent");
        detailView.innerHTML = `
                <div class="lg:col-span-7">
                    <div class="rounded-[40px] overflow-hidden bg-slate-900 border border-white/5 mb-6">
                        <img src="${product.image}" class="w-full h-[500px] object-cover" alt="${product.name}">
                    </div>
                    <div class="flex justify-between items-center mb-4">
                        <h1 class="text-4xl font-black text-white">${product.name}</h1>
                        <div class="text-right">
                            <p class="text-3xl font-black text-emerald-500">$${product.price.toFixed(2)}</p>
                            <p class="text-xs text-slate-500 uppercase font-bold tracking-widest">Per ${product.unit}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 mb-8 text-yellow-500">
                        <i data-lucide="star" class="w-5 h-5 fill-current"></i>
                        <span class="text-lg font-bold">${product.rating}</span>
                        <span class="text-slate-500 text-sm font-medium ml-2">(120+ reviews)</span>
                    </div>
                    <button class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-5 rounded-2xl shadow-xl shadow-emerald-900/20 transition-all flex items-center justify-center gap-3">
                        <i data-lucide="shopping-cart" class="w-6 h-6"></i> Add to Basket
                    </button>
                </div>

                <div class="lg:col-span-5">
                    <div class="glass-card p-8 rounded-[32px] sticky top-8">
                        <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-6">About Farm</h3>
                        <div class="flex items-center gap-4 mb-6 cursor-pointer" onclick="viewFarm(${product.farmId})">
                            <img src="${farm.image}" class="w-16 h-16 rounded-2xl object-cover border border-white/10" />
                            <div>
                                <h4 class="text-xl font-bold text-white group-hover:text-emerald-400">${farm.name}</h4>
                                <p class="text-xs text-slate-500">${farm.location}</p>
                            </div>
                        </div>
                        <p class="text-slate-400 text-sm leading-relaxed mb-6">${farm.description}</p>
                        <div class="grid grid-cols-2 gap-3">
                            ${farm.images.map((img) => `<img src="${img}" class="rounded-xl w-full aspect-square object-cover" />`).join("")}
                        </div>
                    </div>
                </div>
            `;
        showView("product-detail");
      }

      function viewFarm(id) {
        const farm = farms[id];
        const farmView = document.getElementById("farmDetailContent");

        farmView.innerHTML = `
                <div class="relative rounded-[48px] overflow-hidden h-[400px] mb-12">
                    <img src="${farm.image}" class="w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                    <div class="absolute bottom-10 left-10">
                        <h1 class="text-6xl font-black text-white mb-2">${farm.name}</h1>
                        <div class="flex items-center gap-4">
                            <span class="bg-white/10 backdrop-blur-md px-4 py-2 rounded-full text-white font-bold flex items-center gap-2">
                                <i data-lucide="map-pin" class="w-4 h-4 text-emerald-400"></i> ${farm.location}
                            </span>
                            <span class="bg-white/10 backdrop-blur-md px-4 py-2 rounded-full text-white font-bold flex items-center gap-2">
                                ★ ${farm.rating} (Verified)
                            </span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                    <div class="lg:col-span-2">
                        <h2 class="text-2xl font-black text-white mb-6">Our Heritage</h2>
                        <p class="text-slate-400 text-lg leading-relaxed mb-10">${farm.description}</p>
                        
                        <h3 class="text-sm font-black text-slate-500 uppercase tracking-widest mb-4">Purity & Safety Verifications</h3>
                        <div class="flex flex-wrap gap-3 mb-12">
                            ${farm.tags.map((tag) => `<span class="verification-tag">${tag}</span>`).join("")}
                        </div>

                        <h3 class="text-2xl font-black text-white mb-6">Available From This Farm</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${products
                              .filter((p) => p.farmId == id)
                              .map(
                                (p) => `
                                <div class="glass-card p-4 rounded-2xl flex items-center gap-4 cursor-pointer" onclick="viewProduct(${p.id})">
                                    <img src="${p.image}" class="w-20 h-20 rounded-xl object-cover" />
                                    <div>
                                        <h5 class="font-bold text-white">${p.name}</h5>
                                        <p class="text-emerald-400 font-bold">$${p.price.toFixed(2)}</p>
                                    </div>
                                </div>
                            `,
                              )
                              .join("")}
                        </div>
                    </div>
                </div>
            `;
        showView("farm-detail");
      }

      function filterCategory(cat) {
        const filtered = products.filter(
          (p) =>
            p.category.includes(cat) ||
            (cat === "Animal" && p.category === "Animal"),
        );
        renderProducts(filtered, "categoryResults");
        showView("categories");
      }

      function renderTopFarms() {
        const list = document.getElementById("topFarmsList");
        list.innerHTML = Object.keys(farms)
          .map((id) => {
            const f = farms[id];
            return `
                    <div class="glass-card p-6 rounded-[32px] cursor-pointer" onclick="viewFarm(${id})">
                        <div class="flex gap-6">
                            <img src="${f.image}" class="w-32 h-32 rounded-3xl object-cover" />
                            <div class="flex-1">
                                <div class="flex justify-between items-start mb-2">
                                    <h3 class="text-xl font-bold text-white">${f.name}</h3>
                                    <span class="text-emerald-400 font-black">★ ${f.rating}</span>
                                </div>
                                <p class="text-slate-500 text-sm line-clamp-2 mb-4">${f.description}</p>
                                <div class="flex flex-wrap gap-2">
                                    ${f.tags
                                      .slice(0, 2)
                                      .map(
                                        (t) =>
                                          `<span class="text-[9px] border border-white/10 px-2 py-1 rounded text-slate-400 uppercase font-bold">${t}</span>`,
                                      )
                                      .join("")}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
          })
          .join("");
      }

      // Init
      window.onload = () => {
        showView("home");
        lucide.createIcons();
      };
    </script>
  </body>
</html>
